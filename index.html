<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OPAL OUTFITTERS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0b3d2e;
      color: gold;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      background-color: #06281f;
    }

    header h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 2px;
    }

    nav a {
      color: gold;
      text-decoration: none;
      margin: 0 15px;
      font-weight: bold;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .hero {
      text-align: center;
      padding: 100px 20px;
      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)),
                  url('https://images.unsplash.com/photo-1521335629791-ce4aec67dd53');
      background-size: cover;
      background-position: center;
    }

    .hero h2 {
      font-size: 50px;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 20px;
    }

    .btn {
      padding: 12px 25px;
      background-color: gold;
      color: #0b3d2e;
      border: none;
      cursor: pointer;
      font-weight: bold;
      margin-top: 20px;
    }

    .products {
      padding: 50px 20px;
      text-align: center;
    }

    .products h2 {
      margin-bottom: 30px;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .product {
      background-color: #124d3b;
      padding: 15px;
      border-radius: 10px;
    }

    .product img {
      width: 100%;
      border-radius: 10px;
    }

    .product h3 {
      margin: 10px 0;
    }

    .newsletter {
      background-color: #06281f;
      padding: 40px;
      text-align: center;
    }

    .newsletter input {
      padding: 10px;
      width: 250px;
      border: none;
      margin-right: 10px;
    }

    footer {
      text-align: center;
      padding: 20px;
      background-color: #021a14;
    }
  </style>
</head>

<body>

<header>
  <h1>OPAL OUTFITTERS</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#">Shop</a>
    <a href="#">Collections</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <h2>Luxury Fashion Redefined</h2>
  <p>Elegance in Every Thread</p>
  <button class="btn">Shop Now</button>
</section>

<section class="products">
  <h2>Featured Collection</h2>
  <div class="product-grid">

    <div class="product">
      <img src="https://images.unsplash.com/photo-1520975922284-9e0e8c3d92b3">
      <h3>Classic Jacket</h3>
      <p>$120</p>
    </div>

    <div class="product">
      <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f">
      <h3>Elegant Dress</h3>
      <p>$150</p>
    </div>

    <div class="product">
      <img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b">
      <h3>Streetwear Set</h3>
      <p>$95</p>
    </div>

  </div>
</section>

<section class="newsletter">
  <h2>Join Our Newsletter</h2>
  <p>Get updates on new collections & offers</p>
  <input type="email" placeholder="Enter your email">
  <button class="btn">Subscribe</button>
</section>

<footer>
  <p>© 2026 OPAL OUTFITTERS | All Rights Reserved</p>
</footer>

</body>
</html>
